<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Optométrica</title>
    <style>
        body { background-color: #f4f0f6; font-family: 'Segoe UI', sans-serif; color: #4a148c; padding: 20px; }
        .wrapper { max-width: 1100px; margin: auto; display: flex; gap: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 12px 25px; background: #e1bee7; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #4a148c; }
        .tab-btn.active { background: #7b1fa2; color: white; }
        .container { flex: 1.5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #ab47bc; display: none; }
        .card.active { display: block; }
        .history-panel { flex: 1; background: white; padding: 20px; border-radius: 12px; border-top: 5px solid #7b1fa2; }
        h2 { color: #7b1fa2; border-bottom: 2px solid #f3e5f5; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; background: #7b1fa2; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .ojo-tag { font-weight: bold; color: #ab47bc; width: 40px; }
        .clear { display: block; text-align: center; margin-top: 10px; color: #999; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="tab('ret')">Retinoscopía</button>
    <button class="tab-btn" onclick="tab('len')">Lensometría</button>
</div>

<div class="wrapper">
    <div class="container">
        <div id="ret" class="card active">
            <h2>Retinoscopía </h2>
            <form action="/calcular_retinoscopia" method="post">
                <select name="ojo"><option value="OD">OD</option><option value="OI">OI</option></select>
                <div class="grid">
                    <input type="text" name="m1" placeholder="M1" required><input type="number" name="eje1" placeholder="Eje M1" required>
                    <input type="text" name="m2" placeholder="M2" required><input type="number" name="eje2" placeholder="Eje M2" required>
                </div>
                <input type="text" name="distancia" placeholder="Distancia (ej: 1.50)" required>
                <button type="submit">Calcular Retinoscopía</button>
            </form>
        </div>

        <div id="len" class="card">
            <h2>Lensometría </h2>
            <form action="/calcular_lensometria" method="post">
                <select name="ojo_len"><option value="OD">OD</option><option value="OI">OI</option></select>
                <div class="grid">
                    <input type="text" name="l1" placeholder="Lectura 1" required><input type="number" name="eje_l1" placeholder="Eje 1" required>
                    <input type="text" name="l2" placeholder="Lectura 2" required><input type="number" name="eje_l2" placeholder="Eje 2" required>
                </div>
                <button type="submit">Calcular Lensometría</button>
            </form>
        </div>
    </div>

    <div class="history-panel">
        <h2>Registros</h2>
        <strong>Retinoscopía:</strong>
        <table>{% for r in historial_ret %}<tr><td class="ojo-tag">{{r[1]}}</td><td>{{r[2]}}</td></tr>{% endfor %}</table>
        <a href="/limpiar/retinoscopia" class="clear">LIMPIAR RET</a>
        
        <br><strong>Lensometría:</strong>
        <table>{% for l in historial_len %}<tr><td class="ojo-tag">{{l[1]}}</td><td>{{l[2]}}</td></tr>{% endfor %}</table>
        <a href="/limpiar/lensometria" class="clear">LIMPIAR LEN</a>
    </div>
</div>

<script>
    function tab(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Optométrica</title>
    <style>
        body { background-color: #f4f0f6; font-family: 'Segoe UI', sans-serif; color: #4a148c; padding: 15px; margin: 0; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .tab-btn { flex: 1; padding: 12px; background: #e1bee7; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #4a148c; font-size: 14px; }
        .tab-btn.active { background: #7b1fa2; color: white; }

        .wrapper { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #ab47bc; display: none; }
        .card.active { display: block; }
        
        .history-panel { background: white; padding: 20px; border-radius: 12px; border-top: 5px solid #7b1fa2; }
        
        h2 { color: #7b1fa2; font-size: 20px; border-bottom: 2px solid #f3e5f5; padding-bottom: 10px; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        
        button { width: 100%; background: #7b1fa2; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 15px; }
        .ojo-tag { font-weight: bold; color: #ab47bc; width: 45px; }
        .clear { display: block; text-align: center; margin-top: 15px; color: #999; text-decoration: none; font-size: 12px; padding: 10px; }

        /* REGLAS PARA PANTALLAS GRANDES (PC) */
        @media (min-width: 768px) {
            .wrapper { flex-direction: row; }
            .container { flex: 1.5; }
            .history-panel { flex: 1; }
            .tab-btn { flex: none; padding: 12px 30px; }
        }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="tab('ret')">Retinoscopía</button>
    <button class="tab-btn" onclick="tab('len')">Lensometría</button>
</div>

<div class="wrapper">
    <div class="container">
        <div id="ret" class="card active">
            <h2>Retinoscopía</h2>
            <form action="/calcular_retinoscopia" method="post">
                <label>Ojo:</label>
                <select name="ojo"><option value="OD">Ojo Derecho</option><option value="OI">Ojo Izquierdo</option></select>
                <div class="grid">
                    <div><label>M1:</label><input type="text" name="m1" placeholder="+2.00" required></div>
                    <div><label>Eje:</label><input type="number" name="eje1" placeholder="90" required></div>
                    <div><label>M2:</label><input type="text" name="m2" placeholder="+3.50" required></div>
                    <div><label>Eje:</label><input type="number" name="eje2" placeholder="180" required></div>
                </div>
                <label>Distancia de Trabajo:</label>
                <input type="text" name="distancia" placeholder="1.50" required>
                <button type="submit">Calcular Retinoscopía</button>
            </form>
        </div>

        <div id="len" class="card">
            <h2>Lensometría</h2>
            <form action="/calcular_lensometria" method="post">
                <label>Ojo:</label>
                <select name="ojo_len"><option value="OD">Ojo Derecho</option><option value="OI">Ojo Izquierdo</option></select>
                <div class="grid">
                    <div><label>Lectura 1:</label><input type="text" name="l1" required></div>
                    <div><label>Eje 1:</label><input type="number" name="eje_l1" required></div>
                    <div><label>Lectura 2:</label><input type="text" name="l2" required></div>
                    <div><label>Eje 2:</label><input type="number" name="eje_l2" required></div>
                </div>
                <button type="submit">Calcular Lensometría</button>
            </form>
        </div>
    </div>

    <div class="history-panel">
        <h2>Historial</h2>
        <strong>Retinoscopía:</strong>
        <table>{% for r in historial_ret %}<tr><td class="ojo-tag">{{r[1]}}</td><td>{{r[2]}}</td></tr>{% endfor %}</table>
        <a href="/limpiar/retinoscopia" class="clear">LIMPIAR RET</a>
        
        <br><strong>Lensometría:</strong>
        <table>{% for l in historial_len %}<tr><td class="ojo-tag">{{l[1]}}</td><td>{{l[2]}}</td></tr>{% endfor %}</table>
        <a href="/limpiar/lensometria" class="clear">LIMPIAR LEN</a>
    </div>
</div>

<script>
    function tab(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
